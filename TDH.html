<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Quiz Điều Khiển - Tự Động Hóa - 100 câu</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px 10px; /* Lề nhỏ hơn cho mobile */
            background: #400848; /* tím pastel */
            color: #222;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        #quiz-container {
            width: 100%;
            max-width: 800px;
            background: #b753c6;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.12);
            outline: none;
        }
        #question {
            font-size: 1.25em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
            line-height: 1.4;
        }
        .answer-option {
            color: #000000 !important;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            font-size: 1em;
            font-weight: 500;
            border: 2px solid transparent;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            line-height: 1.3;
            /* Chống highlight text khi tap liên tục trên điện thoại */
            -webkit-tap-highlight-color: transparent; 
        }
        .answer-option:active {
            transform: scale(0.98);
        }
        .answer-A { background-color: #D0E8FF; }
        .answer-B { background-color: #D4EDDA; }
        .answer-C { background-color: #FFE5B4; }
        .answer-D { background-color: #F8D7DA; }
        
        .correct {
            background-color: #4CAF50 !important;
            color: white !important;
            border-color: #388e3c !important;
        }
        .wrong {
            background-color: #f44336 !important;
            color: white !important;
            border-color: #d32f2f !important;
        }
        #progress {
            margin-top: 15px;
            font-size: 1em;
            color: #fff;
            font-style: italic;
            text-align: center;
        }
        #result {
            font-size: 1.2em;
            font-weight: 700;
            color: #90ee90;
            text-align: center;
            margin-top: 20px;
        }
        .answer-label {
            font-weight: 700;
            margin-right: 12px;
            min-width: 24px;
            text-align: center;
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
            padding: 2px 0;
        }

        /* TỐI ƯU RIÊNG CHO MÀN HÌNH ĐIỆN THOẠI NHỎ */
        @media (max-width: 480px) {
            body {
                padding: 15px 8px;
            }
            #quiz-container {
                padding: 15px;
            }
            #question {
                font-size: 1.15em;
            }
            .answer-option {
                padding: 12px 14px;
                font-size: 0.95em;
            }
            .answer-label {
                min-width: 20px;
                margin-right: 10px;
            }
        }
    </style>
</head>
<body>

<div id="quiz-container" tabindex="0" aria-live="polite" aria-atomic="true" role="region">
    <div id="question"></div>
    <div id="answers"></div>
    <div id="progress"></div>
    <div id="result" aria-live="assertive"></div>
</div>

<script>
    // Hàm xáo trộn mảng (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    let quizData = [
        { question: 'Khi đo điện áp một chiều bằng vôn kế, thiết bị đo phải được mắc như thế nào với phần tử cần đo?', answers: ['Mắc nối tiếp với tải', 'Mắc song song với phần tử cần đo', 'Mắc nối tiếp với nguồn', 'Mắc chéo qua cầu chì'], correct: 'Mắc song song với phần tử cần đo' },
        { question: 'Khi đo dòng điện một chiều bằng ampe kế, cách mắc đúng là gì?', answers: ['Mắc nối tiếp với tải', 'Mắc song song với tải', 'Mắc song song với nguồn', 'Mắc nối tiếp với vôn kế'], correct: 'Mắc nối tiếp với tải' },
        { question: 'Theo tài liệu thực hành, trước khi xác nhận lối ra nguồn 3 pha đã có điện áp, nên đặt VOM ở thang đo nào?', answers: ['Thang đo thông mạch', 'Thang đo 10VDC', 'Thang đo 1000VAC', 'Thang đo điện trở'], correct: 'Thang đo 1000VAC' },
        { question: 'Máy biến dòng trong mô hình thực hành có chức năng chính là gì?', answers: ['Tăng điện áp AC lên mức cao hơn', 'Biến đổi dòng lớn về mức nhỏ để thiết bị đo làm việc an toàn', 'Ổn định điện áp DC đầu ra', 'Đổi dòng DC thành AC'], correct: 'Biến đổi dòng lớn về mức nhỏ để thiết bị đo làm việc an toàn' },
        { question: 'Cos φ của mạch AC được hiểu đúng nhất là tỷ số giữa đại lượng nào?', answers: ['Công suất biểu kiến và công suất phản kháng', 'Công suất tác dụng và công suất biểu kiến', 'Điện áp và dòng điện', 'Điện áp và điện trở'], correct: 'Công suất tác dụng và công suất biểu kiến' },
        { question: 'Tần số mét được dùng để đo đại lượng nào?', answers: ['Điện trở cách điện', 'Tần số của nguồn AC', 'Hệ số khuếch đại', 'Tốc độ quay động cơ DC'], correct: 'Tần số của nguồn AC' },
        { question: 'Khi tải thay đổi từ thuần trở sang tải cảm, hệ số công suất của mạch thường thay đổi theo xu hướng nào?', answers: ['Tăng lên gần 1', 'Giảm xuống', 'Không đổi tuyệt đối', 'Đổi dấu sang âm'], correct: 'Giảm xuống' },
        { question: 'Một ưu điểm nổi bật của đồng hồ vạn năng số so với đồng hồ kim là gì?', answers: ['Không cần nguồn nuôi', 'Điện trở vào lớn, ít ảnh hưởng mạch đo', 'Không cần chọn thang đo', 'Chỉ đo được AC'], correct: 'Điện trở vào lớn, ít ảnh hưởng mạch đo' },
        { question: 'Với đồng hồ chỉ thị kim, việc cấp ngược cực tính trong thời gian dài có thể gây hiện tượng nào?', answers: ['Kim quay thuận nhanh hơn', 'Kim quay ngược và có thể hỏng đồng hồ', 'Không ảnh hưởng gì', 'Đồng hồ tự đổi thang đo'], correct: 'Kim quay ngược và có thể hỏng đồng hồ' },
        { question: 'Muốn đo thông mạch bằng VOM an toàn, điều kiện quan trọng nhất trước khi đo là gì?', answers: ['Phải cấp điện áp định mức cho mạch', 'Mạch phải đang mang tải', 'Phải cắt nguồn khỏi đối tượng đo', 'Phải mắc thêm điện trở phụ song song'], correct: 'Phải cắt nguồn khỏi đối tượng đo' },
        { question: 'Module nguồn xoay chiều thay đổi trong bộ thực hành dùng phần tử nào để thay đổi điện áp ngõ ra liên tục?', answers: ['Máy phát tốc', 'Biến áp tự ngẫu', 'Cầu diode', 'Encoder quang'], correct: 'Biến áp tự ngẫu' },
        { question: 'Module Vôn kế DC trong tài liệu được thiết kế để đo loại đại lượng nào?', answers: ['Điện áp xoay chiều 3 pha', 'Dòng điện một chiều', 'Điện áp một chiều', 'Tần số nguồn'], correct: 'Điện áp một chiều' },
        { question: 'Module Ampe kế AC trong tài liệu có các thang đo nào?', answers: ['0,5A và 5A', '1A và 2A', '2A và 5A', '5A và 10A'], correct: '0,5A và 5A' },
        { question: 'Công suất tác dụng của tải ba pha đối xứng được xác định gần đúng theo biểu thức nào?', answers: ['P = U.I', 'P = 3.U.I', 'P = √3.U.I.cosφ', 'P = U/I.cosφ'], correct: 'P = √3.U.I.cosφ' },
        { question: 'Đồng hồ đo công suất 1 pha được dùng chủ yếu để xác định đại lượng nào?', answers: ['Công suất phản kháng', 'Công suất tác dụng', 'Điện áp dây', 'Điện kháng tải'], correct: 'Công suất tác dụng' },
        { question: 'Khi đo các đại lượng trên mạch AC, nguyên nhân nào sau đây làm sai lệch kết quả do pha giữa điện áp và dòng điện?', answers: ['Dùng dây màu đỏ', 'Dùng nguồn DC', 'Bỏ qua tính chất tải cảm hoặc tải dung', 'Dùng thang đo cao hơn dự kiến'], correct: 'Bỏ qua tính chất tải cảm hoặc tải dung' },
        { question: 'Trong mạch AC thuần trở, quan hệ pha giữa điện áp và dòng điện là gì?', answers: ['Dòng điện sớm pha 90°', 'Dòng điện trễ pha 90°', 'Cùng pha', 'Ngược pha 180°'], correct: 'Cùng pha' },
        { question: 'Trong mạch chỉ chứa cuộn cảm thuần, dòng điện có quan hệ pha như thế nào so với điện áp?', answers: ['Cùng pha với điện áp', 'Sớm pha 90°', 'Trễ pha 90°', 'Ngược pha 180°'], correct: 'Trễ pha 90°' },
        { question: 'Trong mạch chỉ chứa tụ điện lý tưởng, dòng điện có quan hệ pha như thế nào so với điện áp?', answers: ['Trễ pha 90°', 'Cùng pha', 'Sớm pha 90°', 'Ngược pha 180°'], correct: 'Sớm pha 90°' },
        { question: 'Khi hệ số công suất giảm nhưng công suất tác dụng yêu cầu không đổi, dòng điện đường dây thường sẽ như thế nào?', answers: ['Giảm mạnh', 'Tăng lên', 'Bằng 0', 'Không phụ thuộc cosφ'], correct: 'Tăng lên' },
        { question: 'Trong thực hành đo công suất và cosφ, loại tải nào thường làm cosφ giảm rõ rệt nhất?', answers: ['Tải thuần trở', 'Tải cảm', 'Tải LED báo nguồn', 'Tải đo tần số'], correct: 'Tải cảm' },
        { question: 'Biện pháp nào thường dùng để cải thiện cosφ cho tải cảm?', answers: ['Mắc thêm tụ bù thích hợp', 'Giảm số vòng dây cuộn cảm về 0', 'Thay đồng hồ đo bằng đồng hồ số', 'Mắc thêm cầu chì lớn hơn'], correct: 'Mắc thêm tụ bù thích hợp' },
        { question: 'Nguồn xoay chiều trong các mô hình thực hành của tài liệu chủ yếu có tần số định mức là bao nhiêu?', answers: ['25Hz', '50Hz', '75Hz', '400Hz'], correct: '50Hz' },
        { question: 'Nút nhấn khẩn EMG(emergency) trong mô hình có vai trò chính là gì?', answers: ['Tăng tốc động cơ', 'Ngắt mạch nhanh khi có sự cố', 'Đảo chiều quay', 'Tăng điện áp đầu ra'], correct: 'Ngắt mạch nhanh khi có sự cố' },
        { question: 'Theo hướng dẫn thao tác an toàn, trước khi đóng điện cho nguồn 3 pha cần đặt CB(cầu dao), nút nhấn khẩn và switch ở trạng thái nào?', answers: ['CB lên, EMG nhả, switch ON', 'CB xuống, EMG đang ấn, switch OFF', 'CB lên, EMG ấn, switch OFF', 'CB xuống, EMG nhả, switch ON'], correct: 'CB xuống, EMG đang ấn, switch OFF' },
        { question: 'Nguồn điện một chiều thay đổi trong tài liệu cho phép điều chỉnh liên tục trong dải nào?', answers: ['0 đến 5VDC', '0 đến 12VDC', '0 đến 24VDC', '0 đến 30VDC'], correct: '0 đến 30VDC' },
        { question: 'Vì sao không nên để hở mạch thứ cấp của máy biến dòng khi phía sơ cấp đang có dòng?', answers: ['Vì ampe kế sẽ chỉ về 0', 'Vì có thể sinh điện áp cao nguy hiểm ở thứ cấp', 'Vì tần số nguồn giảm đột ngột', 'Vì tải sơ cấp sẽ tự ngắt'], correct: 'Vì có thể sinh điện áp cao nguy hiểm ở thứ cấp' },
        { question: 'Module Vôn kế AC trong tài liệu được thiết kế với các thang đo nào?', answers: ['30VAC và 220VAC', '50VAC và 300VAC', '100VAC và 500VAC', '220VAC và 380VAC'], correct: '100VAC và 500VAC' },
        { question: 'Module Ampe kế DC trong tài liệu phù hợp với các thang đo nào?', answers: ['1A và 2A', '2A và 5A', '5A và 10A', '10A và 20A'], correct: '2A và 5A' },
        { question: 'Máy biến dòng trong mô hình thường được dùng với loại mạch nào?', answers: ['Mạch dòng DC thuần', 'Mạch AC có dòng lớn', 'Mạch logic 5V', 'Mạch op-amp tích phân'], correct: 'Mạch AC có dòng lớn' },
        { question: 'Khi cần xác định công suất tiêu thụ của tải ba pha trong bộ thực hành, lựa chọn phù hợp nhất là gì?', answers: ['Dùng riêng tần số mét', 'Dùng đồng hồ đo công suất 3 pha', 'Dùng Vôn kế DC', 'Dùng máy hiện sóng thay cho mọi thiết bị khác'], correct: 'Dùng đồng hồ đo công suất 3 pha' },
        { question: 'Cos φ mét dùng để đo đại lượng nào?', answers: ['Hiệu suất động cơ', 'Hệ số công suất của mạch AC', 'Tốc độ góc của động cơ', 'Tần số đóng cắt của thyristor'], correct: 'Hệ số công suất của mạch AC' },
        { question: 'Nếu tăng thành phần tải cảm trong khi điện áp nguồn giữ nguyên, dòng điện của mạch AC thường có xu hướng nào?', answers: ['Lệch pha trễ nhiều hơn so với điện áp', 'Cùng pha tuyệt đối với điện áp', 'Đổi thành dòng DC', 'Bằng 0 do cảm kháng'], correct: 'Lệch pha trễ nhiều hơn so với điện áp' },
        { question: 'Hệ số công suất thấp gây ra hậu quả kỹ thuật nào đáng chú ý nhất?', answers: ['Giảm số cực của động cơ', 'Tăng tổn thất trên đường dây do dòng điện lớn hơn', 'Làm tần số nguồn tăng lên', 'Làm đồng hồ đo điện áp thành đo dòng điện'], correct: 'Tăng tổn thất trên đường dây do dòng điện lớn hơn' },
        { question: 'Khi chưa biết chính xác điện áp lối ra của nguồn AC, nên chọn thang đo VOM như thế nào trước?', answers: ['Nhỏ hơn giá trị dự kiến', 'Bằng đúng giá trị danh định', 'Lớn hơn giá trị dự kiến rồi giảm dần', 'Tùy ý vì kết quả không đổi'], correct: 'Lớn hơn giá trị dự kiến rồi giảm dần' },
        { question: 'Module điều chỉnh góc mở trong bộ thí nghiệm có dải điều khiển góc mở của thyristor là bao nhiêu?', answers: ['0 đến 90°', '0 đến 120°', '0 đến 180°', '90 đến 360°'], correct: '0 đến 180°' },
        { question: 'Ở chế độ điều khiển ngoài AI (Analog Input), điện áp đầu vào 0 đến 10V tương ứng với góc mở thay đổi trong khoảng nào theo tài liệu?', answers: ['0 đến 90°', '90 đến 180°', '180 đến 90°', '0 đến 180° tuyến tính thuận'], correct: '0 đến 180° tuyến tính thuận' },
        { question: 'Module điều chỉnh góc mở 3 pha có khả năng điều khiển tối đa bao nhiêu thyristor?', answers: ['2 thyristor', '4 thyristor', '6 thyristor', '8 thyristor'], correct: '6 thyristor' },
        { question: 'Biên độ xung điều khiển cách ly điện đưa ra cổng kích thyristor là bao nhiêu?', answers: ['5Vp', '10Vp', '12Vp', '15Vp'], correct: '15Vp' },
        { question: 'Sự khác nhau cơ bản giữa chế độ xung “Single” và “Multi” là gì?', answers: ['Single tạo xung liên tục còn Multi chỉ tạo một xung duy nhất', 'Single phát một xung kim tại góc β, Multi phát chùm xung tần số cao từ góc β đến hết nửa chu kỳ', 'Single dùng cho DC còn Multi dùng cho AC', 'Hai chế độ hoàn toàn giống nhau'], correct: 'Single phát một xung kim tại góc β, Multi phát chùm xung tần số cao từ góc β đến hết nửa chu kỳ' },
        { question: 'Các cực cơ bản của thyristor trên module thực hành là gì?', answers: ['B, C, E', 'A, K, G', 'T1, T2, G', 'D, S, G'], correct: 'A, K, G' },
        { question: 'Mạch LC tích hợp trên module điốt và thyristor có tác dụng chính nào?', answers: ['Tăng tần số nguồn', 'Bảo vệ chống sốc điện áp với tải điện cảm', 'Biến AC thành DC', 'Tăng hệ số khuếch đại dòng'], correct: 'Bảo vệ chống sốc điện áp với tải điện cảm' },
        { question: 'Mỗi vạch nhỏ của module ampe kế DC 0 đến 10A tương ứng với giá trị dòng điện xấp xỉ bao nhiêu?', answers: ['0,1A', '0,2A', '0,5A', '1A'], correct: '0,2A' },
        { question: 'Dải đầu ra tương tự VOUT của module PID là bao nhiêu?', answers: ['0 đến 5VDC', '0 đến 10VDC', '0 đến 12VDC', '±15VDC'], correct: '0 đến 10VDC' },
        { question: 'Đèn “O.LOOP” sáng cho biết bộ điều khiển PID đang ở trạng thái nào?', answers: ['Vòng hở', 'Báo quá dòng', 'Dừng khẩn cấp', 'Mất phản hồi cảm biến'], correct: 'Vòng hở' },
        { question: 'Ở chế độ vòng kín, tín hiệu phản hồi tốc độ được đưa vào cổng nào của bộ PID?', answers: ['VOUT', 'ENA', 'VIN', 'G1K1'], correct: 'VIN' },

        q.answers = shuffleArray(q.answers);
    });

    let autoNextTimeout = null;

    const progressEl = document.getElementById('progress');
    const resultEl = document.getElementById('result');
    const quizContainer = document.getElementById('quiz-container');

    const optionLetters = ['A', 'B', 'C', 'D'];
    const optionColors = {
        A: '#D0E8FF',
        B: '#D4EDDA',
        C: '#FFE5B4',
        D: '#F8D7DA',
    };

    function loadQuestion() {
        clearTimeout(autoNextTimeout);
        answered = false;
        resultEl.innerText = '';
        answersEl.innerHTML = '';
        
        const currentData = quizData[currentQuestionIndex];
        questionEl.innerText = `Câu ${currentQuestionIndex + 1}: ${currentData.question}`;
        progressEl.innerText = `Câu ${currentQuestionIndex + 1} / ${quizData.length}`;

        currentData.answers.forEach((answer, index) => {
            const letter = optionLetters[index];
            const btn = document.createElement('div');
            
            btn.classList.add('answer-option', `answer-${letter}`);
            btn.style.backgroundColor = optionColors[letter];
            btn.style.color = '#000000';
            btn.innerHTML = `<span class="answer-label">${letter}</span> ${answer}`;
            btn.tabIndex = 0;
            
            // Dùng thuộc tính data-answer để lưu chuỗi gốc, tránh lỗi cắt chuỗi
            btn.dataset.answer = answer; 
            
            btn.onclick = () => selectAnswer(btn, answer);
            btn.onkeydown = (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    btn.click();
                }
            };
            answersEl.appendChild(btn);
        });

        quizContainer.focus();
    }

    function selectAnswer(btn, answer) {
        if (answered) return;
        answered = true;

        const allOptions = document.querySelectorAll('.answer-option');
        allOptions.forEach(opt => opt.style.pointerEvents = 'none');

        const correctAnswer = quizData[currentQuestionIndex].correct;

        if (answer === correctAnswer) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            // Tìm và highlight đáp án đúng
            allOptions.forEach(opt => {
                if (opt.dataset.answer === correctAnswer) {
                    opt.classList.add('correct');
                }
            });
        }

        resultEl.innerText = 'Chờ 5s tự động qua câu tiếp theo...';

        autoNextTimeout = setTimeout(() => {
            goToNextQuestion();
        }, 5000);
    }

    function goToNextQuestion() {
        clearTimeout(autoNextTimeout);
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            showResult();
        }
    }

    function goToPreviousQuestion() {
        clearTimeout(autoNextTimeout);
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    quizContainer.addEventListener('keydown', function(e) {
        if ((e.key === 'Enter' || e.key === ' ') && answered) {
            e.preventDefault();
            goToNextQuestion();
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            goToNextQuestion();
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            goToPreviousQuestion();
        }
    });

    function showResult() {
        questionEl.innerText = 'Báo Cáo Kết Quả Thi';
        answersEl.innerHTML = '';
        progressEl.innerText = '';
        resultEl.innerText = `Bạn đã hoàn thành bài thi! Điểm của bạn là ${score} / ${quizData.length}.`;
    }

    // Khởi chạy câu hỏi đầu tiên
    loadQuestion();
</script>
</body>
</html>
